<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Node Gradient -->
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="16" fill="url(#bg-grad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.1">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" stroke="#cccccc" stroke-width="1" />
    <path d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 550,0 L 550,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" stroke="#cccccc" stroke-width="1" />
  </g>

  <!-- Decorative Neural/Autoregressive Graphics -->
  <g opacity="0.8">
    <!-- Connecting lines -->
    <line x1="620" y1="125" x2="680" y2="85" stroke="#4f46e5" stroke-dasharray="4 4" stroke-width="1.5" />
    <line x1="620" y1="125" x2="680" y2="165" stroke="#4f46e5" stroke-dasharray="4 4" stroke-width="1.5" />
    <line x1="680" y1="85" x2="740" y2="125" stroke="#a855f7" stroke-width="2" />
    <line x1="680" y1="165" x2="740" y2="125" stroke="#a855f7" stroke-width="2" />

    <!-- Nodes representing token generation -->
    <circle cx="620" cy="125" r="8" fill="#38bdf8" filter="url(#glow)" />
    <circle cx="680" cy="85" r="10" fill="url(#node-grad)" />
    <circle cx="680" cy="165" r="10" fill="url(#node-grad)" />
    <circle cx="740" cy="125" r="14" fill="#f43f5e" filter="url(#glow)" />
    
    <!-- Pulse ring around target token -->
    <circle cx="740" cy="125" r="22" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.5" stroke-dasharray="5 3" />
    
    <!-- Token labels -->
    <text x="620" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">t-2</text>
    <text x="680" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">t-1</text>
    <text x="740" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#f43f5e" font-weight="bold" text-anchor="middle">Token t</text>
  </g>

  <!-- Typography -->
  <g transform="translate(60, 0)">
    <!-- Subtitle/Topic -->
    <text x="0" y="85" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#38bdf8" letter-spacing="2">LLM INFERENCE ACCELERATION</text>
    
    <!-- Title -->
    <text x="0" y="135" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="url(#text-grad)" filter="url(#glow)">Awesome Autoregressive Decoding</text>
    
    <!-- Description -->
    <text x="0" y="175" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Evolution, Variants, Verification Types &amp; Production Challenges</text>
  </g>
</svg>
